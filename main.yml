name: tägliche Analyse Sektoren
on:
  push:
    branches:
      - main
  # Ermöglicht dir, den Job jederzeit manuell per Klick im Browser zu starten
  workflow_dispatch: 
  schedule:
    # 03:17 UTC entspricht 05:17 Uhr MESZ (Sommerzeit). Bewusst NICHT zur vollen
    # Stunde (03:00), da GitHub Actions Cron-Läufe zu vollen Stunden/Mitternacht
    # UTC nachweislich häufiger verzögert oder komplett überspringt (Best-Effort-
    # Scheduling, siehe GitHub-Community-Diskussionen zu Backend-Zuverlässigkeit
    # seit Februar 2026).
    - cron: '17 3 * * 1-5'
jobs:
  run-scripts:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--no-deprecation"
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py pandas google-auth-oauthlib google-api-python-client google-auth-httplib2 groq yfinance scipy google-genai

      - name: Offene Positionen aktualisieren
        # Läuft VOR der Analyse: lädt Offene_Positionen.csv aus Drive, prüft
        # jede manuell bestätigte Position gegen den aktuellen Kurs/Stop und
        # lädt die aktualisierte Datei wieder hoch. Die lokale Kopie wird
        # anschließend von analyse.py für den Briefing-Abschnitt
        # "OFFENE POSITIONEN" eingelesen.
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python positionen_tracker.py

      - name: Analyse ausführen
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python analyse.py

      - name: Trendwende-Scan ausführen
        # Separater Scanner (Boden-Suche nach einem Fall) - eigene Datei,
        # eigener Briefing-Abschnitt, bewusst getrennt vom Hauptscanner.
        # Läuft NACH analyse.py, da er Bausteine daraus importiert - und
        # braucht deshalb auch GROQ_API_KEY, obwohl trendwende_scanner.py
        # selbst kein Groq nutzt: der Import von analyse.py führt dessen
        # kompletten Modul-Code aus, inkl. der Zeile "client = Groq(...)".
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python trendwende_scanner.py

      - name: Edelmetalle-Scan ausführen
        # NEU (24.07.2026): wendet die Hauptscanner-Kriterien auf Gold/
        # Silber/Platin/Palladium an (feste 4er-Liste statt Sektor-Rotation,
        # siehe edelmetalle_scanner.py). Braucht wie Trendwende/Short auch
        # GROQ_API_KEY, obwohl selbst kein Groq genutzt wird - der Import
        # von analyse.py fuehrt dessen kompletten Modul-Code aus.
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python edelmetalle_scanner.py

      - name: Short-Scan nachholen falls heute nicht gelaufen
        # NEU (24.07.2026): short_check.yml (01:53 UTC) ist ein eigener,
        # frueherer Cron-Lauf - GitHub-Actions-Scheduling ist "best effort"
        # und kann an einzelnen Tagen einfach nicht feuern (beobachtet am
        # 24.07.2026). Dieser Schritt prueft kurz gegen Drive, ob die
        # heutige Short_Setups.csv schon da ist, und holt short_scanner.py
        # nur dann nach, wenn sie fehlt - normalerweise also ein no-op.
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python short_scan_catchup.py

      - name: Gemini-Auswertung erstellen
        # Ersetzt das manuelle Kopieren in das Gemini-Gem: liest die Master-
        # Anweisung (Sicherung_Gemini_Engine_Trading-Setups_Automatisierung.md,
        # muss im Repo liegen) sowie alle Tagesdateien und erzeugt
        # Auswertung(<Datum>).txt. Läuft NACH beiden Scannern, damit alle
        # Dateien (inkl. Trendwende) bereits vorliegen. Bewusst die
        # kostenlose Gemini-API statt der kostenpflichtigen Claude-API.
        # GDRIVE_TOKEN (NEU): zum optionalen Nachladen der Short_Setups/
        # Short_Briefing-Dateien aus Drive (separater, früherer Short-Scan-
        # Workflow) - fehlt das Secret, wird dieser Teil einfach übersprungen.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: python gemini_auswertung.py

      - name: Daten hochladen
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: python upload_to_drive.py
